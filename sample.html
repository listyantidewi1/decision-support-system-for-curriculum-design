<script>
const jsonText = document.getElementById("json-data").textContent;
const data = JSON.parse(jsonText);

function getJobId(item) {
  return item["job_id"] || item["﻿job_id"] || "N/A";
}

function renderSection(title, items) {
  const container = document.getElementById("content");
  const h2 = document.createElement("h2");
  h2.textContent = title;
  container.appendChild(h2);

  items.forEach((item, idx) => {
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.innerHTML = `<div class="label">Sample ${idx + 1}</div><div class="small">${item.id ? "Competency ID: " + item.id : ""}</div>`;
    card.appendChild(header);

    const row1 = document.createElement("div");
    row1.className = "row";
    row1.innerHTML = `
      <div class="col"><div class="label">Title</div><div class="value">${item.title || ""}</div></div>
    `;
    card.appendChild(row1);

    const row2 = document.createElement("div");
    row2.className = "row";
    row2.innerHTML = `
      <div class="col"><div class="label">Description</div><div class="value">${item.description || ""}</div></div>
    `;
    card.appendChild(row2);

    const row3 = document.createElement("div");
    row3.className = "row";
    row3.innerHTML = `
      <div class="col"><div class="label">Related Skills</div><div class="value">${(item.related_skills || []).join(", ")}</div></div>
    `;
    card.appendChild(row3);

    const row4 = document.createElement("div");
    row4.className = "row";
    row4.innerHTML = `
      <div class="col"><div class="label">Future Relevance</div><div class="value">${item.future_relevance || ""}</div></div>
    `;
    card.appendChild(row4);

    const details = document.createElement("details");
    const summary = document.createElement("summary");
    summary.textContent = "Show full JSON for this sample";
    details.appendChild(summary);
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(item, null, 2);
    details.appendChild(pre);
    card.appendChild(details);

    container.appendChild(card);
  });
}

renderSection("Top 10 Competency Examples (mixed soft + hard)", data.competency_examples || []);
</script>
