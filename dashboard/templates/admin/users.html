{% extends "base.html" %}
{% block content %}
<h2>Users</h2>

<section class="card">
  <h3>Create User</h3>
  <form method="post" action="/dashboard/admin/users/create" class="grid2">
    <div>
      <label>Email</label>
      <input name="email" type="email" required />
    </div>
    <div>
      <label>Password</label>
      <input name="password" type="password" required />
    </div>
    <div>
      <label>Role</label>
      <select name="role">
        <option value="admin">admin</option>
        <option value="school">school</option>
      </select>
    </div>
    <div>
      <label>School (for school role)</label>
      <select name="school_id">
        <option value="">-- none --</option>
        {% for s in schools %}
          <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div><button type="submit">Create user</button></div>
  </form>
</section>

<section class="card">
  <table>
    <tr><th>ID</th><th>Email</th><th>Role</th><th>School</th><th>Created</th></tr>
    {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>
        <td>{{ u.school_name or "-" }}</td>
        <td>{{ u.created_at }}</td>
      </tr>
    {% endfor %}
  </table>
</section>
{% endblock %}
